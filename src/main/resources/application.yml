spring:
  application:
    name: core-banking

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/core_banking?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${SPRING_DATASOURCE_USERNAME:core}
    password: ${SPRING_DATASOURCE_PASSWORD:core}

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  cache:
    type: ${SPRING_CACHE_TYPE:none}
    redis:
      time-to-live: ${CORE_BANKING_CACHE_TTL:60s}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always
      continue-on-error: true

  batch:
    job:
      enabled: ${SPRING_BATCH_JOB_ENABLED:false}
      name: seedJob
    jdbc:
      initialize-schema: always

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,caches

logging:
  level:
    com.corebanking: DEBUG
    org.hibernate.SQL: DEBUG

core-banking:
  cache:
    ttl: ${CORE_BANKING_CACHE_TTL:60s}
    account-ttl: ${CORE_BANKING_ACCOUNT_CACHE_TTL:30s}
    ledger-ttl: ${CORE_BANKING_LEDGER_CACHE_TTL:60s}
  account:
    lock-mode: ${CORE_BANKING_ACCOUNT_LOCK_MODE:pessimistic}
  seed:
    account-count: ${CORE_BANKING_SEED_ACCOUNT_COUNT:1000}
    transfer-count: ${CORE_BANKING_SEED_TRANSFER_COUNT:10000}
