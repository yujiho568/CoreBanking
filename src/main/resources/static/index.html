<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CoreBanking Transfer Test</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --panel: #ffffff;
      --line: #d8dee6;
      --text: #17202a;
      --muted: #667085;
      --brand: #0f766e;
      --brand-dark: #115e59;
      --danger: #b42318;
      --ok: #067647;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    .wrap {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
    }

    .topbar {
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
    }

    main {
      padding: 24px 0 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
    }

    .panel h2 {
      margin: 0 0 14px;
      font-size: 16px;
    }

    label {
      display: block;
      margin: 12px 0 6px;
      font-size: 13px;
      color: var(--muted);
    }

    input,
    select {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 14px;
      background: #fff;
      color: var(--text);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    button {
      min-height: 40px;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 8px 13px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    button.primary {
      background: var(--brand);
      color: #fff;
    }

    button.primary:hover {
      background: var(--brand-dark);
    }

    button.secondary {
      border-color: var(--line);
      background: #fff;
      color: var(--text);
    }

    .status {
      min-height: 22px;
      font-size: 13px;
      color: var(--muted);
    }

    .status.ok {
      color: var(--ok);
    }

    .status.error {
      color: var(--danger);
    }

    .accounts {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .account {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      display: grid;
      gap: 6px;
    }

    .account strong {
      font-size: 15px;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .amount {
      font-size: 20px;
      font-weight: 800;
      color: var(--brand-dark);
    }

    pre {
      margin: 0;
      min-height: 220px;
      max-height: 420px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #101828;
      color: #e4e7ec;
      padding: 14px;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    @media (max-width: 820px) {
      .grid,
      .row {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
        padding: 14px 0;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap topbar">
      <h1>CoreBanking Transfer Test</h1>
      <div id="health" class="status">health 확인 전</div>
    </div>
  </header>

  <main class="wrap">
    <div class="grid">
      <section class="panel">
        <h2>계좌</h2>
        <div class="row">
          <div>
            <label for="fromAccountId">출금 계좌</label>
            <select id="fromAccountId">
              <option>ACC-001</option>
              <option>ACC-002</option>
              <option>ACC-003</option>
              <option>BENCH-FROM</option>
            </select>
          </div>
          <div>
            <label for="toAccountId">입금 계좌</label>
            <select id="toAccountId">
              <option>ACC-002</option>
              <option>ACC-001</option>
              <option>ACC-003</option>
              <option>BENCH-TO</option>
            </select>
          </div>
        </div>
        <div class="actions">
          <button class="secondary" type="button" id="refreshAccounts">잔액 새로고침</button>
          <button class="secondary" type="button" id="swapAccounts">계좌 바꾸기</button>
        </div>
        <div id="accounts" class="accounts"></div>
      </section>

      <section class="panel">
        <h2>이체</h2>
        <label for="idempotencyKey">Idempotency Key</label>
        <input id="idempotencyKey" value="web-test-001">

        <label for="amount">금액</label>
        <input id="amount" type="number" min="0.01" step="0.01" value="10000">

        <div class="actions">
          <button class="primary" type="button" id="submitTransfer">이체 실행</button>
          <button class="secondary" type="button" id="newKey">새 키 생성</button>
        </div>
        <p id="message" class="status"></p>
      </section>
    </div>

    <section class="panel" style="margin-top: 16px;">
      <h2>응답</h2>
      <pre id="output">{}</pre>
    </section>
  </main>

  <script>
    const health = document.querySelector("#health");
    const output = document.querySelector("#output");
    const message = document.querySelector("#message");
    const accounts = document.querySelector("#accounts");
    const fromAccountId = document.querySelector("#fromAccountId");
    const toAccountId = document.querySelector("#toAccountId");
    const idempotencyKey = document.querySelector("#idempotencyKey");
    const amount = document.querySelector("#amount");

    function showOutput(data) {
      output.textContent = JSON.stringify(data, null, 2);
    }

    function setMessage(text, type) {
      message.textContent = text;
      message.className = type ? `status ${type}` : "status";
    }

    async function request(path, options) {
      const response = await fetch(path, options);
      const text = await response.text();
      let body = text;
      try {
        body = text ? JSON.parse(text) : {};
      } catch (error) {
        body = { raw: text };
      }

      if (!response.ok) {
        const error = new Error(body.message || response.statusText);
        error.body = body;
        error.status = response.status;
        throw error;
      }

      return body;
    }

    async function checkHealth() {
      try {
        const data = await request("/actuator/health");
        health.textContent = `health: ${data.status}`;
        health.className = "status ok";
      } catch (error) {
        health.textContent = "health: DOWN";
        health.className = "status error";
      }
    }

    async function loadAccount(accountId) {
      return request(`/api/accounts/${encodeURIComponent(accountId)}`);
    }

    function renderAccounts(items) {
      accounts.innerHTML = items.map((account) => `
        <article class="account">
          <div class="meta">
            <strong>${account.accountId}</strong>
            <span>${account.status}</span>
          </div>
          <div>${account.ownerName}</div>
          <div class="amount">${Number(account.balance).toLocaleString()} 원</div>
          <div class="meta">
            <span>available ${Number(account.availableBalance).toLocaleString()}</span>
            <span>version ${account.version}</span>
          </div>
        </article>
      `).join("");
    }

    async function refreshAccounts() {
      setMessage("계좌 조회 중...", "");
      try {
        const ids = [...new Set([fromAccountId.value, toAccountId.value])];
        const data = await Promise.all(ids.map(loadAccount));
        renderAccounts(data);
        showOutput(data);
        setMessage("계좌 조회 완료", "ok");
      } catch (error) {
        showOutput(error.body || { message: error.message });
        setMessage(`계좌 조회 실패: ${error.message}`, "error");
      }
    }

    async function submitTransfer() {
      setMessage("이체 처리 중...", "");
      const body = {
        idempotencyKey: idempotencyKey.value.trim(),
        fromAccountId: fromAccountId.value,
        toAccountId: toAccountId.value,
        amount: Number(amount.value)
      };

      try {
        const data = await request("/api/transfers", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });
        showOutput(data);
        setMessage(`이체 완료: ${data.transferId}`, "ok");
        await refreshAccounts();
      } catch (error) {
        showOutput(error.body || { message: error.message });
        setMessage(`이체 실패: ${error.message}`, "error");
      }
    }

    function makeKey() {
      const now = new Date();
      const stamp = now.toISOString().replace(/[-:.TZ]/g, "").slice(0, 14);
      idempotencyKey.value = `web-test-${stamp}`;
      setMessage("새 키 생성 완료", "ok");
    }

    document.querySelector("#refreshAccounts").addEventListener("click", refreshAccounts);
    document.querySelector("#submitTransfer").addEventListener("click", submitTransfer);
    document.querySelector("#newKey").addEventListener("click", makeKey);
    document.querySelector("#swapAccounts").addEventListener("click", () => {
      const currentFrom = fromAccountId.value;
      fromAccountId.value = toAccountId.value;
      toAccountId.value = currentFrom;
      refreshAccounts();
    });

    fromAccountId.addEventListener("change", refreshAccounts);
    toAccountId.addEventListener("change", refreshAccounts);

    checkHealth();
    refreshAccounts();
  </script>
</body>
</html>
