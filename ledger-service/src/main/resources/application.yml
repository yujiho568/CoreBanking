spring:
  application:
    name: ledger-service

  datasource:
    url: jdbc:h2:mem:ledgerdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  kafka:
    bootstrap-servers: localhost:9092

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8083

management:
  tracing:
    sampling:
      probability: 1.0

logging:
  pattern:
    console: "%d{HH:mm:ss} [%thread] [traceId=%X{traceId}] %-5level %logger{36} - %msg%n"
  level:
    com.corebanking: DEBUG
    org.springframework.kafka: INFO
